name: CI/CD

# CI à chaque push et PR ; déploiement FTP automatique uniquement sur push vers main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------
  # Intégration continue : validation de la syntaxe PHP
  # ----------------------------------------------------------
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Vérifier la syntaxe de tous les fichiers PHP (php -l)
        run: |
          find . -type f -name '*.php' -not -path './.git/*' -print0 \
            | xargs -0 -n1 -P4 php -l

      - name: Refuser un config.php committé par erreur
        run: |
          if git ls-files --error-unmatch configuration/config.php >/dev/null 2>&1; then
            echo "::error::configuration/config.php ne doit jamais être committé (secrets)."
            exit 1
          fi

  # ----------------------------------------------------------
  # Déploiement continu : rsync over SSH (natif, hors Docker) vers
  # Hostinger (port 65002). Pas de --delete → config.php / medias /
  # fichiers hors dépôt jamais supprimés. Les --exclude les protègent
  # aussi de tout transfert.
  # ----------------------------------------------------------
  deploy:
    name: Déploiement rsync/SSH (prod)
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: true
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Charger la clé SSH dans l'agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Diagnostic connexion SSH
        env:
          H: ${{ secrets.SSH_HOST }}
          P: ${{ secrets.SSH_PORT }}
        run: |
          echo "Test d'accès TCP vers $H:$P ..."
          timeout 30 bash -c "cat < /dev/null > /dev/tcp/$H/$P" \
            && echo "Port joignable." \
            || { echo "::error::Impossible de joindre $H:$P (bloqué/filtré ou secret invalide)"; exit 1; }

      - name: Déployer via rsync
        env:
          H: ${{ secrets.SSH_HOST }}
          P: ${{ secrets.SSH_PORT }}
          U: ${{ secrets.SSH_USER }}
          R: ${{ secrets.SSH_REMOTE_PATH }}
        run: |
          rsync -avz --no-perms --no-times \
            -e "ssh -p $P -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='docs/' \
            --exclude='base-de-donnees/' \
            --exclude='configuration/config.php' \
            --exclude='medias/' \
            --exclude='*.md' \
            --exclude='fix-admin-hash.php' \
            --exclude='debloquer-admin.php' \
            --exclude='generer-hash-admin.php' \
            ./ "$U@$H:$R"
