name: CI/CD

# CI à chaque push et PR ; déploiement FTP automatique uniquement sur push vers main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------
  # Intégration continue : validation de la syntaxe PHP
  # ----------------------------------------------------------
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Vérifier la syntaxe de tous les fichiers PHP (php -l)
        run: |
          find . -type f -name '*.php' -not -path './.git/*' -print0 \
            | xargs -0 -n1 -P4 php -l

      - name: Refuser un config.php committé par erreur
        run: |
          if git ls-files --error-unmatch configuration/config.php >/dev/null 2>&1; then
            echo "::error::configuration/config.php ne doit jamais être committé (secrets)."
            exit 1
          fi

  # ----------------------------------------------------------
  # Déploiement continu : rsync over SSH vers Hostinger (port 65002)
  # Bien plus stable que FTPS pour les syncs complets.
  # ----------------------------------------------------------
  deploy:
    name: Déploiement SSH (prod)
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: true
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Déployer via rsync/SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          # -a archive, -z compression, -v verbeux. Pas de --delete pour ne
          # jamais supprimer config.php / medias / fichiers hors dépôt.
          # Les --exclude protègent aussi ces chemins de tout transfert.
          switches: >-
            -avz
            --exclude='.git/'
            --exclude='.github/'
            --exclude='docs/'
            --exclude='base-de-donnees/'
            --exclude='configuration/config.php'
            --exclude='medias/'
            --exclude='*.md'
            --exclude='fix-admin-hash.php'
            --exclude='debloquer-admin.php'
            --exclude='generer-hash-admin.php'
          path: ./
          remote_path: ${{ secrets.SSH_REMOTE_PATH }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
