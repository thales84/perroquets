name: CI/CD

# CI à chaque push et PR ; déploiement FTP automatique uniquement sur push vers main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------
  # Intégration continue : validation de la syntaxe PHP
  # ----------------------------------------------------------
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Vérifier la syntaxe de tous les fichiers PHP (php -l)
        run: |
          find . -type f -name '*.php' -not -path './.git/*' -print0 \
            | xargs -0 -n1 -P4 php -l

      - name: Refuser un config.php committé par erreur
        run: |
          if git ls-files --error-unmatch configuration/config.php >/dev/null 2>&1; then
            echo "::error::configuration/config.php ne doit jamais être committé (secrets)."
            exit 1
          fi

  # ----------------------------------------------------------
  # Déploiement continu : déclenche le "pull" Git côté Hostinger.
  # Hostinger tire le dépôt (sortant) — aucune connexion entrante à
  # filtrer, contrairement à SSH/FTP que Hostinger bloque depuis les
  # IP de datacenters. Le webhook est appelé en HTTPS (port 443).
  # ----------------------------------------------------------
  deploy:
    name: Déploiement Git Hostinger (prod)
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: true
    steps:
      - name: Déclencher le déploiement Hostinger (webhook)
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "${{ secrets.HOSTINGER_DEPLOY_HOOK }}")
          echo "Réponse webhook Hostinger : HTTP $code"
          # Hostinger renvoie 200 (ou 2xx) quand le pull est accepté.
          case "$code" in
            2*) echo "Déploiement déclenché." ;;
            *)  echo "::error::Webhook Hostinger a répondu HTTP $code"; exit 1 ;;
          esac
